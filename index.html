<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0f" />
    <meta name="description" content="Plataforma de competencia de CrossFit" />
    <link rel="icon" type="image/png" href="/favicon-transparent.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon-transparent.png?v=2" />
    <title>Crossfit Gaymes</title>
    <script>
      const savedTheme = localStorage.getItem('theme')
      document.documentElement.dataset.theme = savedTheme ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
